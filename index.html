<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Air Chord — Gesture Instrument</title>
<style>
  :root { --bg: #0a0a0f; --panel: #111118; --gold: #c9a84c; --text: #e0e0e0; --muted: #888; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; height: 100dvh; width: 100vw;
    display: flex; flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }

  #header {
    padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
    background: var(--panel); border-bottom: 1px solid #222; z-index: 10;
    font-size: 14px; letter-spacing: .5px;
  }
  #header .title { font-weight: 600; color: var(--gold); }
  #status { font-size: 12px; padding: 3px 8px; border-radius: 10px; background: #222; }
  #status.active { background: #1a3a1a; color: #4f4; }

  #camera-wrap {
    flex: 1; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

  #controls {
    display: flex; gap: 8px; padding: 10px 12px;
    background: var(--panel); border-top: 1px solid #222;
    flex-wrap: wrap; align-items: center; z-index: 10; font-size: 13px;
  }
  #controls select, #controls button {
    background: #1a1a24; color: var(--text); border: 1px solid #333;
    padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
  }
  #controls button { background: var(--gold); color: #000; border: none; font-weight: 600; }
  #controls button:active { opacity: .8; }
  #controls label { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }

  #data-panel {
    position: absolute; top: 12px; right: 12px; z-index: 20;
    background: rgba(0,0,0,.65); padding: 10px 14px; border-radius: 10px;
    font-size: 12px; line-height: 1.6; backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.08); min-width: 100px;
  }
  #data-panel .note-display { font-size: 32px; font-weight: 700; color: var(--gold); }
</style>
</head>
<body>

<div id="header">
  <span class="title">◆ Air Chord</span>
  <span id="status">initializing…</span>
</div>

<div id="camera-wrap">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="data-panel">
    <div id="note-label" class="note-display">—</div>
    <div id="freq-info" style="color:var(--muted)">Freq: — Hz</div>
    <div id="vol-info" style="color:var(--muted)">Vol: —%</div>
  </div>
</div>

<div id="controls">
  <label>Scale
    <select id="scale-select">
      <option value="major">Major</option>
      <option value="minor">Minor</option>
      <option value="chromatic">Chromatic</option>
    </select>
  </label>
  <label>Wave
    <select id="wave-select">
      <option value="sine">Sine</option>
      <option value="triangle">Triangle</option>
      <option value="square">Square</option>
      <option value="sawtooth">Sawtooth</option>
    </select>
  </label>
  <label>Oct
    <select id="octave-select">
      <option value="3">3</option>
      <option value="4" selected>4</option>
      <option value="5">5</option>
    </select>
  </label>
  <button id="toggle-audio">🔇 Start Audio</button>
</div>

<div id="loading-bar-wrap" style="position:fixed;bottom:0;left:0;right:0;height:3px;z-index:99;background:#222">
  <div id="loading-bar" style="height:100%;width:0%;background:var(--gold);transition:width .3s"></div>
  <div id="loading-text" style="position:absolute;bottom:6px;left:12px;font-size:10px;color:var(--muted)"></div>
</div>
<script>
  window._airChord = { progress(el) {
    const bar = document.getElementById('loading-bar');
    const txt = document.getElementById('loading-text');
    if (bar) bar.style.width = el.pct + '%';
    if (txt && el.msg) txt.textContent = el.msg;
  }};
  window._airChord.progress({pct:5, msg:'booting…'});
</script>

<script type="module">
const MP_URL = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm';
const { HandLandmarker, FilesetResolver } = await import(MP_URL);

// ─── DOM ──────────────────────────────────────────
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const noteLabel = document.getElementById('note-label');
const freqInfo = document.getElementById('freq-info');
const volInfo = document.getElementById('vol-info');
const toggleBtn = document.getElementById('toggle-audio');
const scaleSelect = document.getElementById('scale-select');
const waveSelect = document.getElementById('wave-select');
const octaveSelect = document.getElementById('octave-select');

// ─── State ────────────────────────────────────────
let handLandmarker = null;
let audioCtx = null;
let oscillator = null;
let gainNode = null;
let audioStarted = false;
let currentNote = null;
let smoothVol = 0;
let smoothPitch = 0.5;

// ─── Note definitions ─────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const MAJOR_NOTES = ['C','D','E','F','G','A','B'];
const MINOR_NOTES = ['C','D','Eb','F','G','Ab','Bb'];

function getScaleNotes(scale) {
  if (scale === 'major') return MAJOR_NOTES;
  if (scale === 'minor') return MINOR_NOTES;
  return NOTE_NAMES;
}

function noteToFreq(note, octave = 4) {
  const idx = NOTE_NAMES.indexOf(note);
  if (idx === -1) return 261.63;
  return 440 * Math.pow(2, (idx - NOTE_NAMES.indexOf('A') + (octave - 4) * 12) / 12);
}

// ─── Audio ────────────────────────────────────────
async function startAudio() {
  if (audioStarted) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;
  gainNode.connect(audioCtx.destination);
  audioStarted = true;
  toggleBtn.textContent = '🔊 Live';
  statusEl.textContent = 'live';
  statusEl.className = 'active';
}

function playNote(freq, volume) {
  if (!audioStarted) return;
  if (oscillator) { try { oscillator.stop() } catch(e) {} }
  oscillator = audioCtx.createOscillator();
  oscillator.type = waveSelect.value;
  oscillator.frequency.value = freq;
  oscillator.connect(gainNode);
  oscillator.start();
  gainNode.gain.value = volume * 0.4;
}

function stopNote() {
  if (oscillator) { try { oscillator.stop() } catch(e) {}; oscillator = null; }
  if (gainNode) gainNode.gain.value = 0;
}

// ─── Gesture ──────────────────────────────────────
function isExtended(lm, tip, pip) { return lm[tip].y < lm[pip].y; }

function countFingers(lm) {
  return (isExtended(lm,4,2)?1:0) + (isExtended(lm,8,6)?1:0) +
         (isExtended(lm,12,10)?1:0) + (isExtended(lm,16,14)?1:0) +
         (isExtended(lm,20,18)?1:0);
}

// ─── Drawing ──────────────────────────────────────
function drawSkeleton(lm, w, h, color) {
  const conns = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  conns.forEach(([a,b]) => {
    ctx.beginPath();
    ctx.moveTo(lm[a].x*w, lm[a].y*h);
    ctx.lineTo(lm[b].x*w, lm[b].y*h);
    ctx.stroke();
  });
  lm.forEach(p => { ctx.beginPath(); ctx.arc(p.x*w, p.y*h, 3, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill(); });
}

function drawBar(cx, w, top, h, pitch, volume) {
  // Background
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(cx - w/2, top, w, h);
  // Volume fill
  ctx.fillStyle = 'rgba(201,168,76,0.3)';
  ctx.fillRect(cx - w/2, top, w * volume, h);
  // Pitch line
  const py = top + h * (1 - pitch);
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx - w/2 - 6, py); ctx.lineTo(cx + w/2 + 6, py); ctx.stroke();
}

// ─── Main loop ────────────────────────────────────
let lastTime = 0;
const SMOOTH = 0.3; // smoothing factor (lower = smoother)

async function processFrame() {
  try {
  if (!handLandmarker) { requestAnimationFrame(processFrame); return; }

  const now = performance.now();
  if (now - lastTime < 33) { requestAnimationFrame(processFrame); return; }
  lastTime = now;

  const results = handLandmarker.detectForVideo(video, now);
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  if (results.landmarks && results.landmarks.length > 0) {
    const lm = results.landmarks[0]; // first hand only
    const wrist = lm[0];
    const fingers = countFingers(lm);

    // Smooth pitch and volume
    const rawPitch = 1.0 - wrist.y; // 0=bottom, 1=top
    smoothPitch = smoothPitch + (rawPitch - smoothPitch) * SMOOTH;
    const rawVol = fingers / 5;
    smoothVol = smoothVol + (rawVol - smoothVol) * SMOOTH;

    // Map to note
    const scaleNotes = getScaleNotes(scaleSelect.value);
    const noteIdx = Math.floor(smoothPitch * scaleNotes.length);
    const note = scaleNotes[Math.min(noteIdx, scaleNotes.length - 1)];
    const octave = parseInt(octaveSelect.value) || 4;
    const freq = noteToFreq(note, octave);

    // Audio
    if (smoothVol < 0.05) {
      stopNote();
    } else if (!currentNote || currentNote.note !== note || Math.abs(currentNote.vol - smoothVol) > 0.03) {
      playNote(freq, smoothVol);
      currentNote = { note, vol: smoothVol, freq };
    }

    // Display
    noteLabel.textContent = smoothVol < 0.05 ? '—' : note;
    freqInfo.textContent = `Freq: ${Math.round(freq)} Hz`;
    volInfo.textContent = `Vol: ${Math.round(smoothVol * 100)}%`;

    // Draw
    drawSkeleton(lm, w, h, '#c9a84c');
    drawBar(w * 0.85, 28, h * 0.1, h * 0.8, smoothPitch, smoothVol);

    // Scale labels on bar
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '10px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(scaleNotes[scaleNotes.length-1], w*0.85, h*0.1 - 4);
    ctx.fillText(scaleNotes[0], w*0.85, h*0.1 + h*0.8 + 14);
    ctx.fillStyle = '#c9a84c'; ctx.font = 'bold 16px system-ui';
    ctx.fillText(note, w*0.85, h*0.1 + h*0.8*(1-smoothPitch) - 12);

  } else {
    noteLabel.textContent = '—';
    freqInfo.textContent = 'Freq: — Hz';
    volInfo.textContent = 'Vol: —%';
    stopNote();
    currentNote = null;
  }

  requestAnimationFrame(processFrame);
  } catch (err) {
    console.warn('Frame:', err.message);
    requestAnimationFrame(processFrame);
  }
}

// ─── Boot ─────────────────────────────────────────
async function init() {
  const setStatus = (msg, cls) => { statusEl.textContent = msg; if (cls) statusEl.className = cls; };
  try {
    setStatus('📷 camera…');
    window._airChord?.progress({pct:10, msg:'camera…'});
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
    video.srcObject = stream;
    await video.play();
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.style.transform = 'scaleX(-1)';

    setStatus('📦 loading…');
    window._airChord?.progress({pct:30, msg:'wasm…'});
    const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');

    setStatus('🧠 model…');
    window._airChord?.progress({pct:60, msg:'model…'});
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',
        delegate: 'CPU',
      },
      runningMode: 'VIDEO', numHands: 2,
    });

    setStatus('✅ ready — tap audio', 'active');
    window._airChord?.progress({pct:100, msg:'ready'});
    setTimeout(() => { const w = document.getElementById('loading-bar-wrap'); if (w) w.style.display = 'none'; }, 1000);
    requestAnimationFrame(processFrame);
  } catch (err) {
    setStatus('❌ ' + err.message);
    console.error(err);
  }
}

toggleBtn.addEventListener('click', startAudio);
init();
</script>
</body>
</html>
